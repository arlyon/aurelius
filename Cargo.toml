[package]
name = "aurelius"
version = "0.1.0"
edition = "2024"

[profile.release]
lto = "thin"

[dependencies]
tokio = { version = "1.43.0", features = ["full"] }
anyhow = "1.0.96"
clap = { version = "4.5.30", features = ["derive"] }
hf-hub = "0.4.1"
ignore = "0.4.23"
kreuzberg = "4.8.4"
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.139"

candle-core = "0.10.2"
candle-nn = "0.10.2"
candle-transformers = "0.10.2"
tokenizers = "0.22.2"

swiftide = "0.32.1"
lance-graph = "0.5.4"
lancedb = "0.27.2"
